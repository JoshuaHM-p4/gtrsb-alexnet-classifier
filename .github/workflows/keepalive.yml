name: Keep Render Free Service Warm

on:
  schedule:
    - cron: "7,17,27,37,47,57 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Ping health endpoint
        env:
          TARGET_URL: ${{ secrets.RENDER_HEALTHCHECK_URL }}
        run: |
          if [ -z "$TARGET_URL" ]; then
            echo "Missing secret: RENDER_HEALTHCHECK_URL"
            exit 1
          fi
          curl -fsS --retry 2 --retry-delay 5 --max-time 30 "$TARGET_URL" >/dev/null
          echo "Ping OK: $TARGET_URL"
